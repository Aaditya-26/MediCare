{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
	<title>MediCare</title>

	<!-- Favicon -->
	<link rel="shortcut icon" type="image/x-icon" href="{% static 'HealthStack-System/images/Normal/favicon.png' %}">

	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="{% static 'HealthStack-System/css/admin/bootstrap.min.css' %}">

	<!-- Fontawesome CSS -->
	<link rel="stylesheet" href="{% static 'HealthStack-System/css/admin/font-awesome.min.css' %}">

	<!-- Main CSS -->
	<link rel="stylesheet" href="{% static 'HealthStack-System/css/admin/style.css' %}">
</head>

<body>

	<!-- Main Wrapper -->
	<div class="main-wrapper login-body">
		<div class="login-wrapper">
			<div class="container">
				<div class="loginbox">
					<div class="login-left">
						<img class="img-fluid" src="{% static 'HealthStack-System/images/Normal/footer_logo1.png' %}"
							alt="Logo">
					</div>
					<div class="login-right">
						<div class="login-right-wrap">
							<h1>Login</h1>
							<p class="account-subtitle">Access to our dashboard</p>

							<!-- Messages -->
							{% if messages %}
							{% for message in messages %}
							<div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show"
								role="alert">
								{{ message }}
								<button type="button" class="close" data-dismiss="alert" aria-label="Close">
									<span aria-hidden="true">&times;</span>
								</button>
							</div>
							{% endfor %}
							{% endif %}

							<!-- Form -->
							<form action="{% url 'admin_login' %}" method="POST">
								{% csrf_token %}
								<div class="form-group">
									<input class="form-control" type="text" placeholder="Username" name="username">
								</div>
								<div class="form-group">
									<input class="form-control" type="password" id="myInput" placeholder="Password"
										name="password">
									<div class="mt-2">
										<input type="checkbox" id="showPassCheckbox" onclick="togglePassword()">
										<label for="showPassCheckbox" class="mb-0"
											style="font-weight:normal;cursor:pointer;">Show Password</label>
									</div>
								</div>
								<div class="form-group">
									<button class="btn btn-primary btn-block" type="submit">Login</button>
								</div>
							</form>
							<!-- /Form -->

							<div class="social-login">
								<span>Return to <a href="{% url 'hospital_home' %}">Homepage</a></span>
							</div>
							<div class="text-center mt-2">Don't have an account? <a
									href="{% url 'admin_register' %}">Register</a></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- /Main Wrapper -->

	<!-- jQuery -->
	<script src="{% static 'HealthStack-System/js/admin/jquery-3.2.1.min.js' %}"></script>

	<!-- Bootstrap Core JS -->
	<script src="{% static 'HealthStack-System/js/admin/popper.min.js' %}"></script>
	<script src="{% static 'HealthStack-System/js/admin/bootstrap.min.js' %}"></script>

	<!-- Custom JS -->
	<script src="{% static 'HealthStack-System/js/admin/script.js' %}"></script>

	<!-- Show/hide password -->
	<script>
		function togglePassword() {
			var x = document.getElementById('myInput');
			x.type = (x.type === 'password') ? 'text' : 'password';
		}

		// Auto-dismiss alerts after 4 seconds
		$(document).ready(function () {
			setTimeout(function () {
				$('.alert').fadeOut('slow');
			}, 4000);
		});
	</script>

</body>

</html>
